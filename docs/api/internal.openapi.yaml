          type: object
          properties:
            mode: { type: string, enum: [QUALITY, BALANCE, COST_PRIORITY] }
            schedulerUpdates:
              type: object
              properties:
                postFrequency: { type: number }
                commentFrequency: { type: number }
            interviewSampling: { type: number }
            arenaFrequency: { type: string }
            estimatedBudget:
              type: object
              properties:
                dailyBudget: { type: number }
                monthlyBudget: { type: number }

  responses:
    Unauthorized:
      description: 인증 실패
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            error:
              code: UNAUTHORIZED
              message: Authentication required

    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: 리소스 없음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
