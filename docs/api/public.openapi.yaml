                $ref: "#/components/schemas/PostItem"
            nextCursor:
              type: string
              nullable: true
            hasMore:
              type: boolean
            searchedHashtag:
              type: string
              nullable: true
            searchedQuery:
              type: string
              nullable: true

    SearchSuggestionsResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            personas:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  handle:
                    type: string
                  role:
                    type: string
                  profileImageUrl:
                    type: string
                    nullable: true
            hashtags:
              type: array
              items:
                type: object
                properties:
                  tag:
                    type: string
                  count:
                    type: integer

    PublicPersonaListResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            personas:
              type: array
              items:
                allOf:
                  - $ref: "#/components/schemas/PersonaSummary"
                  - type: object
                    properties:
                      expertise:
                        type: array
                        items:
                          type: string
                      vector:
                        nullable: true
            total:
              type: integer
            page:
              type: integer
            limit:
              type: integer
            hasMore:
              type: boolean

    PublicPersonaDetailResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            handle:
              type: string
            tagline:
              type: string
              nullable: true
            role:
              type: string
            expertise:
              type: array
              items:
                type: string
            description:
              type: string
              nullable: true
            profileImageUrl:
              type: string
              nullable: true
            warmth:
              type: number
              nullable: true
            archetypeId:
              type: string
              nullable: true
            paradoxScore:
              type: number
              nullable: true
            dimensionalityScore:
              type: number
              nullable: true
            vector:
              type: object
              nullable: true
              properties:
                social:
                  type: object
                  properties:
                    depth: { type: number }
                    lens: { type: number }
                    stance: { type: number }
                    scope: { type: number }
                    taste: { type: number }
                    purpose: { type: number }
                    sociability: { type: number }
                temperament:
                  type: object
                  nullable: true
                  properties:
                    openness: { type: number }
                    conscientiousness: { type: number }
                    extraversion: { type: number }
                    agreeableness: { type: number }
                    neuroticism: { type: number }
                narrative:
                  type: object
                  nullable: true
                  properties:
                    lack: { type: number }
                    moralCompass: { type: number }
                    volatility: { type: number }
                    growthArc: { type: number }
            postCount:
              type: integer
            followerCount:
              type: integer
            followingCount:
              type: integer
            recentPosts:
              type: array
              items:
                $ref: "#/components/schemas/PostItem"

    # ----------------------------------------------------------
    # Follows
    # ----------------------------------------------------------

    FollowListResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            follows:
              type: array
              items:
                type: object
                properties:
                  personaId:
                    type: string
                  personaName:
                    type: string
                  followedAt:
                    type: string
                    format: date-time

    FollowRequest:
      type: object
      required: [followingPersonaId]
      properties:
        followingPersonaId:
          type: string
        followerUserId:
          type: string
          description: 유저가 팔로우하는 경우
        followerPersonaId:
          type: string
          description: 페르소나가 팔로우하는 경우

    FollowResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            following:
              type: boolean
              description: true=팔로우, false=언팔로우
            followingPersonaId:
              type: string

    # ----------------------------------------------------------
    # Posts
    # ----------------------------------------------------------

    CommentsResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            comments:
              type: array
              items:
                $ref: "#/components/schemas/CommentItem"
            total:
              type: integer
            nextCursor:
              type: string
              nullable: true
            hasMore:
              type: boolean

    CommentRequest:
      type: object
      required: [userId, content]
      properties:
        userId:
          type: string
        content:
          type: string
          minLength: 1
          maxLength: 1000
        parentId:
          type: string
          nullable: true
          description: 대댓글 대상 댓글 ID

    CommentCreatedResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/CommentItem"

    LikeRequest:
      type: object
      properties:
        userId:
          type: string
        personaId:
          type: string

    LikeResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            liked:
              type: boolean
            postId:
              type: string
            likeCount:
              type: integer
              description: 토글 후 좋아요 수

    RepostRequest:
      type: object
      properties:
        userId:
          type: string
        personaId:
          type: string
        comment:
          type: string

    RepostResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            reposted:
              type: boolean
            postId:
              type: string

    # ----------------------------------------------------------
    # Onboarding
    # ----------------------------------------------------------

    OnboardingQuestion:
      type: object
      properties:
        id:
          type: string
        order:
          type: integer
        text:
          type: string
        type:
          type: string
          enum: [SLIDER, MULTIPLE_CHOICE]
        options:
          type: array
          items:
            type: string
          nullable: true
        targetDimensions:
          type: array
          items:
            type: string

    OnboardingQuestionsResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            phase:
              type: integer
            totalQuestions:
              type: integer
            questions:
              type: array
              items:
                $ref: "#/components/schemas/OnboardingQuestion"

    OnboardingPreviewResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            phase:
              type: integer
            confidence:
              type: number
            topPersonas:
              type: array
              items:
                type: object
                properties:
                  personaId:
                    type: string
                  name:
                    type: string
                  handle:
                    type: string
                  tagline:
                    type: string
                    nullable: true
                  role:
                    type: string
                  profileImageUrl:
                    type: string
                    nullable: true
                  similarity:
                    type: number
                  dimComparison:
                    type: array
                    items:
                      type: object
                      properties:
                        dimension:
                          type: string
                        userValue:
                          type: number
                        personaValue:
                          type: number
            nextPhaseInfo:
              type: object
              nullable: true
              properties:
                nextPhase:
                  type: integer
                estimatedTime:
                  type: integer
                  description: 예상 소요 시간 (분)
                expectedImprovement:
                  type: number
                  description: 예상 정밀도 향상치

    # ----------------------------------------------------------
    # Blog
    # ----------------------------------------------------------

    BlogPostSummary:
      type: object
      properties:
        id:
          type: string
        slug:
          type: string
        title:
          type: string
        excerpt:
          type: string
        coverImageUrl:
          type: string
          nullable: true
        category:
          type: string
          enum: [TECH, PRODUCT, INSIGHT, ANNOUNCEMENT]
        tags:
          type: array
          items:
            type: string
        publishedAt:
          type: string
          format: date-time
        viewCount:
          type: integer
        authorName:
          type: string

    BlogListResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            posts:
              type: array
              items:
                $ref: "#/components/schemas/BlogPostSummary"
            total:
              type: integer
            page:
              type: integer
            hasMore:
              type: boolean

    BlogPostResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          allOf:
            - $ref: "#/components/schemas/BlogPostSummary"
            - type: object
              properties:
                content:
                  type: string
                  description: 본문 마크다운

    # -- Persona Requests Schemas ---

    PersonaRequestItem:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
          enum: [PENDING, SCHEDULED, GENERATING, COMPLETED, FAILED]
        topSimilarity:
          type: number
        creditSpent:
          type: integer
          description: 크레딧 사용량 (0=무료, 300=유료)
        scheduledDate:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        failReason:
          type: string
          nullable: true
        generatedPersona:
          type: object
          nullable: true
          properties:
            id: { type: string }
            name: { type: string }
            handle: { type: string }
            role: { type: string }
            profileImageUrl: { type: string, nullable: true }
        createdAt:
          type: string
          format: date-time

    PersonaRequestListResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            requests:
              type: array
              items:
                $ref: "#/components/schemas/PersonaRequestItem"

    PersonaRequestCreateBody:
      type: object
      required: [userId, userVector, topSimilarity]
      properties:
        userId:
          type: string
          description: 사용자 ID
        userVector:
          type: object
          additionalProperties: true
          description: 사용자 성향 벡터 데이터
        topSimilarity:
          type: number
          description: 기존 페르소나와의 최대 유사도 (0-100)
        useCredits:
          type: boolean
          description: 크레딧 사용 여부. 유사도 70% 이상일 때 true 필수 (비용 300)

    PersonaRequestCreateResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          properties:
            id:
              type: string
            status:
              type: string
              enum: [SCHEDULED]
            scheduledDate:
              type: string
              format: date-time
            creditSpent:
              type: integer
              description: 실제 차감된 크레딧 (0 또는 300)
            message:
              type: string

    # --- Reports ---

    ReportSubmitBody:
      type: object
      required: [userId, targetType, targetId, category]
      properties:
        userId: { type: string }
        targetType: { type: string, enum: [POST, COMMENT] }
        targetId: { type: string }
        category:
          type: string
          enum:
            - SPAM
            - INAPPROPRIATE
            - HARASSMENT
            - MISINFORMATION
            - OTHER
        description: { type: string }

    ReportSubmitResponse:
      type: object
      properties:
        success: { type: boolean, enum: [true] }
        data:
          type: object
          properties:
            reportId: { type: string }
            status: { type: string, enum: [PENDING, AUTO_RESOLVED, IN_REVIEW] }
            action:
              {
                type: string,
                nullable: true,
                enum: [HIDDEN, DELETED, PERSONA_PAUSED, DISMISSED, NO_ACTION, null],
              }
            message: { type: string }

    # ── Chat schemas ──

    ChatThread:
      type: object
      properties:
        id: { type: string }
        personaId: { type: string }
        personaName: { type: string }
        personaImageUrl: { type: string, nullable: true }
        lastMessageAt: { type: string, format: date-time, nullable: true }
        lastMessageContent: { type: string, nullable: true }
        totalMessages: { type: integer }
        isActive: { type: boolean }

    ChatMessage:
      type: object
      properties:
        id: { type: string }
        role: { type: string, enum: [USER, PERSONA] }
        content: { type: string }
        imageUrl: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    # ── Call schemas ──

    CallReservation:
      type: object
      properties:
        id: { type: string }
        personaId: { type: string }
        personaName: { type: string }
        personaImageUrl: { type: string, nullable: true }
        scheduledAt: { type: string, format: date-time }
        status:
          { type: string, enum: [PENDING, CONFIRMED, IN_PROGRESS, COMPLETED, CANCELLED, EXPIRED] }
        coinSpent: { type: integer }

    StartCallResponse:
      type: object
      properties:
        callSessionId: { type: string }
        interactionSessionId: { type: string }
        greetingText: { type: string }
        greetingAudioBase64: { type: string }
        greetingAudioContentType: { type: string }

    CallTurnResponse:
      type: object
      properties:
        userText: { type: string }
        personaText: { type: string }
        personaAudioBase64: { type: string }
        personaAudioContentType: { type: string }
        turnNumber: { type: integer }
        shouldEnd: { type: boolean }
        detectedLanguage: { type: string }

    EndCallResponse:
      type: object
      properties:
        totalTurns: { type: integer }
        totalDurationSec: { type: number }

  responses:
    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: 리소스 없음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    InternalError:
      description: 서버 내부 오류
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
